name: AI Data Pipeline Automation

# 1. The Trigger: When should the cloud server wake up?
on:
  schedule:
    # This CRON expression means: Run at 02:00 UTC (around 7:30 AM IST) every single day
    - cron: '0 2 * * *'
  
  # This allows you to click a "Run Now" button on GitHub to test it manually
  workflow_dispatch: 

# 2. The Job: What should the server do when it wakes up?
jobs:
  run-daily-etl:
    # Spin up a temporary Linux server
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install Python on the server
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step C: Read your requirements.txt and install Pandas, Google SDK, etc.
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # NEW STEP: Securely rebuild the credentials.json file from the vault
      - name: Create Google Credentials
        env:
          GCP_KEY: ${{ secrets.GCP_CREDENTIALS }}
        run: echo "$GCP_KEY" > credentials.json

      # Step D: Run your master script!
      - name: Execute Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Inject the Gemini key
        run: python main.py
