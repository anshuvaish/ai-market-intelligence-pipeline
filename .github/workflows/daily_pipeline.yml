name: AI Data Pipeline Automation

# 1. The Trigger: When should the cloud server wake up?
on:
  schedule:
    # This CRON expression means: Run at 02:00 UTC (around 7:30 AM IST) every single day
    - cron: '0 2 * * *'
  
  # This allows you to click a "Run Now" button on GitHub to test it manually
  workflow_dispatch: 

# 2. The Job: What should the server do when it wakes up?
jobs:
  run-daily-etl:
    # Spin up a temporary Linux server
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your code from your repository onto this temporary server
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step B: Install Python on the server
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step C: Read your requirements.txt and install Pandas, Google SDK, etc.
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # Step D: Run your master script!
      - name: Execute Pipeline
        run: python main.py
